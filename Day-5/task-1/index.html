<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Simple Quiz</h1>
        
        <!-- Quiz Area -->
        <div id="quizArea">
            <div id="questionNumber">Question 1 of 5</div>
            <div id="questionText">Loading...</div>
            
            <div id="options">
            
            </div>
            
            <div id="feedback"></div>
            
            <button id="nextBtn">Next →</button>
            <button id="resultBtn" style="display:none;">Show Result</button>
        </div>


        <div id="resultArea" style="display:none;">
            <h2>Your Score</h2>
            <div id="scoreDisplay">0 / 5</div>
            <div id="gradeDisplay">Grade: F</div>
            <div id="messageDisplay">Keep practicing!</div>
            <button id="restartBtn">🔄 Try Again</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
