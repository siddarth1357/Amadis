<!DOCTYPE html>
<html>
<head>
    <title>Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Click Counter</h1>
        
        <!-- Display the count -->
        <div id="countDisplay">0</div>
        
        <!-- Buttons -->
        <button id="decreaseBtn">−</button>
        <button id="resetBtn">Reset</button>
        <button id="increaseBtn">+</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
